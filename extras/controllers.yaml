# controller_manager parameters
controller_manager:
  ros__parameters:
    update_rate: 100  # Controller manager update rate in Hz

    # --- Controller Definitions ---
    # These names MUST match the spawner arguments in your launch file
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

# --- Controller Parameter Definitions ---
# These are at the TOP LEVEL (no indentation)
# and must match the controller names defined above.

joint_state_broadcaster:
  ros__parameters:
    # This controller has no specific parameters to set here
    # but the section is needed.
    {}

diff_drive_controller:
  ros__parameters:
    # --- Joint Names ---
    # These must match the joints in your URDF
    left_wheel_names: ["chassis_left_wheel_joint"]
    right_wheel_names: ["chassis_right_wheel_joint"]

    # --- Physical Properties ---
    wheel_separation: 0.38856  # Distance between wheel centers
    wheel_radius: 0.05       # Radius of the wheels (0.1 diameter)

    # --- Odometry ---
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    publish_rate: 50.0       # Odometry publish rate in Hz

    # --- Other Settings ---
    use_stamped_vel: false   # Set to true if your /cmd_vel is stamped

